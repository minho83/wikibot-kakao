<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파티방 관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
    background: #0f1424; color: #e8ecf5; min-height: 100vh; padding: 16px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.4rem; color: #5ad1ff; margin-bottom: 4px; }
  .sub { color: #8a93a8; font-size: .85rem; margin-bottom: 20px; }
  .card { background: #182036; border: 1px solid #283354; border-radius: 12px; padding: 18px; margin-bottom: 18px; }
  .card h2 { font-size: 1.05rem; color: #cdd6ee; margin-bottom: 14px; }
  label { display: block; font-size: .82rem; color: #9aa3ba; margin: 10px 0 4px; }
  input[type=text] {
    width: 100%; background: #0f1424; border: 1px solid #2f3a5e; color: #e8ecf5;
    padding: 11px 12px; border-radius: 8px; font-size: 1rem;
  }
  input[type=text]:focus { outline: none; border-color: #5ad1ff; }
  .modes { display: flex; gap: 10px; margin-top: 6px; }
  .modes label {
    flex: 1; margin: 0; display: flex; align-items: center; gap: 8px; cursor: pointer;
    background: #0f1424; border: 1px solid #2f3a5e; padding: 11px 12px; border-radius: 8px;
    color: #cdd6ee; font-size: .9rem;
  }
  .modes label.active { border-color: #5ad1ff; background: #16263a; }
  .modes input { accent-color: #5ad1ff; }
  .hint { font-size: .78rem; color: #6f7891; margin-top: 6px; line-height: 1.5; }
  button {
    width: 100%; margin-top: 16px; padding: 13px; border: none; border-radius: 8px;
    background: #2f7bff; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  button:hover { background: #1f6bef; }
  button.ghost { background: transparent; border: 1px solid #2f3a5e; color: #9aa3ba; }
  button:disabled { opacity: .5; cursor: default; }
  .msg { margin-top: 12px; padding: 11px 12px; border-radius: 8px; font-size: .9rem; display: none; }
  .msg.ok { display: block; background: #14331f; border: 1px solid #2e6b41; color: #8ff0b4; }
  .msg.err { display: block; background: #331616; border: 1px solid #6b2e2e; color: #f0a3a3; }
  .room { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid #232c47; }
  .room:last-child { border-bottom: none; }
  .room .info { flex: 1; min-width: 0; }
  .room .name { font-weight: 600; color: #e8ecf5; }
  .room .id { font-size: .76rem; color: #6f7891; word-break: break-all; }
  .badge { font-size: .72rem; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge.collect { background: #14331f; color: #8ff0b4; border: 1px solid #2e6b41; }
  .badge.query { background: #20283f; color: #9db4e0; border: 1px solid #34406a; }
  .rm { width: auto; margin: 0; padding: 7px 11px; font-size: .8rem; background: #3a2230; color: #f0a3a3; border: 1px solid #6b2e3f; }
  .rm:hover { background: #5a2436; }
  .empty { color: #6f7891; text-align: center; padding: 20px; font-size: .9rem; }
  .toprow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .refresh { width: auto; margin: 0; padding: 6px 12px; font-size: .8rem; background: transparent; border: 1px solid #2f3a5e; color: #9aa3ba; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎉 파티방 관리</h1>
  <p class="sub">방 번호(chat_id)를 입력해 파티 수집/조회 방을 설정합니다.</p>

  <div class="card" id="loginCard">
    <h2>🔒 관리자 로그인</h2>
    <div id="loggedOut">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" placeholder="관리자 비밀번호" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()">로그인</button>
    </div>
    <div id="loggedIn" style="display:none">
      <p style="color:#8ff0b4">✅ 인증됨 — 방을 추가/제거할 수 있습니다.</p>
      <button class="ghost" onclick="logout()">로그아웃</button>
    </div>
    <div class="msg" id="loginMsg"></div>
  </div>

  <div class="card">
    <h2>방 추가 / 수정</h2>
    <label for="roomId">방 번호 (chat_id)</label>
    <input type="text" id="roomId" inputmode="numeric" placeholder="예: 18446744073709551615" autocomplete="off">
    <p class="hint">카톡 방에서 <b>!방확인</b> 을 입력하면 chat_id 가 나옵니다. 그 숫자를 붙여넣으세요.</p>

    <label for="roomName">방 이름 (선택)</label>
    <input type="text" id="roomName" placeholder="예: 어둠의전설 나겔탑" autocomplete="off">

    <label>모드</label>
    <div class="modes" id="modes">
      <label class="active"><input type="radio" name="mode" value="collect" checked>수집 + 조회</label>
      <label><input type="radio" name="mode" value="query">조회만</label>
    </div>
    <p class="hint"><b>수집+조회</b>: 방의 일반 메시지를 자동 수집하고 !파티 조회도 가능<br><b>조회만</b>: 수집 없이 !파티 조회만 허용</p>

    <button id="addBtn" onclick="addRoom()">추가하기</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="card">
    <div class="toprow">
      <h2 style="margin:0">등록된 방</h2>
      <button class="refresh" onclick="loadRooms()">새로고침</button>
    </div>
    <div id="rooms"><div class="empty">불러오는 중…</div></div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('partyAdminToken') || '';

function authHeaders(json) {
  const h = token ? { 'Authorization': 'Bearer ' + token } : {};
  if (json) h['Content-Type'] = 'application/json';
  return h;
}

function showMsg(text, ok) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + (ok ? 'ok' : 'err');
}

function renderAuth() {
  document.getElementById('loggedOut').style.display = token ? 'none' : 'block';
  document.getElementById('loggedIn').style.display = token ? 'block' : 'none';
}

async function login() {
  const password = document.getElementById('pw').value;
  const m = document.getElementById('loginMsg');
  try {
    const r = await fetch(API + '/api/admin/auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const d = await r.json();
    if (d.success && d.token) {
      token = d.token;
      localStorage.setItem('partyAdminToken', token);
      document.getElementById('pw').value = '';
      m.className = 'msg ok'; m.textContent = '로그인되었습니다.';
      renderAuth();
    } else {
      m.className = 'msg err'; m.textContent = d.message || '비밀번호가 틀렸습니다.';
    }
  } catch (e) {
    m.className = 'msg err'; m.textContent = '서버 통신 오류: ' + e.message;
  }
}

function logout() {
  token = '';
  localStorage.removeItem('partyAdminToken');
  renderAuth();
}

document.querySelectorAll('#modes label').forEach(l => {
  l.addEventListener('click', () => {
    document.querySelectorAll('#modes label').forEach(x => x.classList.remove('active'));
    l.classList.add('active');
  });
});

async function addRoom() {
  const room_id = document.getElementById('roomId').value.trim();
  const room_name = document.getElementById('roomName').value.trim();
  const collect = document.querySelector('input[name=mode]:checked').value === 'collect';
  if (!room_id) { showMsg('방 번호를 입력하세요.', false); return; }

  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  try {
    const r = await fetch(API + '/api/party/rooms', {
      method: 'POST',
      headers: authHeaders(true),
      body: JSON.stringify({ room_id, room_name, collect })
    });
    if (r.status === 401) { showMsg('인증이 필요합니다. 먼저 관리자 로그인하세요.', false); return; }
    const d = await r.json();
    if (d.success) {
      showMsg(d.message || '추가되었습니다.', true);
      document.getElementById('roomId').value = '';
      document.getElementById('roomName').value = '';
      loadRooms();
    } else {
      showMsg(d.message || '추가 실패', false);
    }
  } catch (e) {
    showMsg('서버 통신 오류: ' + e.message, false);
  } finally {
    btn.disabled = false;
  }
}

async function removeRoom(id, name) {
  if (!confirm(`'${name || id}' 방을 제거할까요?`)) return;
  try {
    const r = await fetch(API + '/api/party/rooms/' + encodeURIComponent(id), {
      method: 'DELETE', headers: authHeaders(false)
    });
    if (r.status === 401) { showMsg('인증이 필요합니다. 먼저 관리자 로그인하세요.', false); return; }
    const d = await r.json();
    showMsg(d.message || (d.success ? '제거됨' : '제거 실패'), !!d.success);
    loadRooms();
  } catch (e) {
    showMsg('서버 통신 오류: ' + e.message, false);
  }
}

async function loadRooms() {
  const box = document.getElementById('rooms');
  try {
    const r = await fetch(API + '/api/party/rooms');
    const d = await r.json();
    const rooms = d.rooms || [];
    if (!rooms.length) { box.innerHTML = '<div class="empty">등록된 방이 없습니다.</div>'; return; }
    box.innerHTML = rooms.map(rm => {
      const badge = rm.collect
        ? '<span class="badge collect">수집+조회</span>'
        : '<span class="badge query">조회만</span>';
      const name = rm.room_name || '(이름 없음)';
      return `<div class="room">
        <div class="info">
          <div class="name">${escapeHtml(name)}</div>
          <div class="id">${escapeHtml(rm.room_id)}</div>
        </div>
        ${badge}
        <button class="rm" onclick="removeRoom('${escapeAttr(rm.room_id)}','${escapeAttr(name)}')">제거</button>
      </div>`;
    }).join('');
  } catch (e) {
    box.innerHTML = '<div class="empty">목록을 불러오지 못했습니다: ' + e.message + '</div>';
  }
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return String(s).replace(/['\\]/g, '\\$&').replace(/"/g, '&quot;'); }

renderAuth();
loadRooms();
</script>
</body>
</html>
